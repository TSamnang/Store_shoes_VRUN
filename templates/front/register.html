<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - We Run Shoes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        body { background: var(--bg-dark); }
        .auth-layout { min-height: 100vh; display: grid; grid-template-columns: 1.1fr 1fr; }
        .auth-left { background: #ffc107; color: #111; display: flex; flex-direction: column; justify-content: center; padding: 4rem; }
        .auth-left h1 { font-size: 3rem; letter-spacing: -1px; }
        .auth-left p { max-width: 360px; line-height: 1.8; }
        .auth-right { background: var(--bg-darker); padding: 4rem; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 100%; max-width: 460px; }
        .auth-card .form-control { background: var(--input-bg); color: var(--body-text); border-color: var(--border-color); }
        .auth-card .btn-google { border: 1px solid rgba(255,255,255,.25); }
        .auth-card a { color: #ffc107; }
        .auth-card a:hover { text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-layout">
        <div class="auth-left">
            <h1>SIGN UP</h1>
            <p>Sign up to start saving your favorite sneakers, managing orders, and unlocking VIP offers.</p>
            <a href="{{ url_for('login') }}" class="btn btn-dark btn-lg rounded-pill mt-4" style="width: fit-content;">Login</a>
        </div>
        <div class="auth-right d-flex align-items-center">
            <div class="auth-card text-white">
                <h2 class="mb-4">Create account</h2>
                {% include 'front/flash_messages.html' %}
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Your username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Create a password" required>
                    </div>
                    <button class="btn btn-warning btn-lg w-100 rounded-pill mb-3" type="submit">Sign Up</button>
                </form>
                <div class="text-center mb-3">
                    <span class="text-muted">or continue with</span>
                </div>
                <button class="btn btn-outline-light btn-google w-100 rounded-pill mb-3"><i class="fa-brands fa-google me-2"></i>Continue with Google</button>
                <p class="text-center text-muted">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
