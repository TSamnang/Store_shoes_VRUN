<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - We Run Shoes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script>if(localStorage.getItem('vrun-theme')==='light'){document.documentElement.setAttribute('data-theme','light')}else{document.documentElement.removeAttribute('data-theme')}</script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body>
    <a href="{{ url_for('homepage') }}" class="home-btn"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="auth-layout">
        <div class="auth-left d-none d-lg-flex">
            <div class="auth-left-content">
                <h1>Join the<br>Movement</h1>
                <p>Create an account to save your favorites, manage your orders, and secure the freshest sneaker drops.</p>
                <img src="{{ url_for('static', filename='images/Gold Nike.png') }}" alt="Premium Sneaker" class="hero-shoe mt-5">
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="height: 50px; filter: brightness(0) invert(1) sepia(1) saturate(10000%) hue-rotate(15deg) brightness(1.2);">
                </div>
                <h2 class="auth-title">Create Account</h2>
                {% include 'base/flash_messages.html' %}
                
                <form method="post">
                    <div class="form-floating-custom">
                        <input type="text" name="username" id="username" class="custom-input" placeholder=" " required>
                        <label for="username" class="custom-label">Username</label>
                    </div>
                    
                    <div class="form-floating-custom">
                        <input type="email" name="email" id="email" class="custom-input" placeholder=" " required>
                        <label for="email" class="custom-label">Email Address</label>
                    </div>
                    
                    <div class="form-floating-custom">
                        <input type="password" name="password" id="password" class="custom-input" placeholder=" " required style="padding-right: 45px;">
                        <label for="password" class="custom-label">Password</label>
                        <i class="fa-regular fa-eye pass-toggle" id="togglePassword" onclick="togglePass('password', 'togglePassword')"></i>
                    </div>
                    
                    <button class="btn-auth mt-2" type="submit">Sign Up</button>
                </form>
                
                <div class="divider">Or</div>
                
                <button class="btn-google"><i class="fa-brands fa-google text-danger"></i> Continue with Google</button>
                
                <div class="auth-links">
                    Already have an account? <a href="{{ url_for('login') }}">Log in here</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
